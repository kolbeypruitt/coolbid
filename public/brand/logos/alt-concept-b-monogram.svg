<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGradB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="sheenB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="56" ry="56" fill="url(#bgGradB)"/>
  <rect x="8" y="8" width="240" height="240" rx="56" ry="56" fill="url(#sheenB)"/>

  <!-- Thermostat dial: outer ring + opening to form a "C" that implies cool -->
  <g transform="translate(128 128)">
    <!-- Open-ring C shape -->
    <path d="M 60 -25 A 70 70 0 1 0 60 25" fill="none" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round"/>
    <!-- Inner center snowflake -->
    <g stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" fill="none">
      <line x1="0" y1="-28" x2="0" y2="28"/>
      <line x1="-24" y1="-14" x2="24" y2="14"/>
      <line x1="-24" y1="14" x2="24" y2="-14"/>
      <line x1="0" y1="-20" x2="-5" y2="-25"/>
      <line x1="0" y1="-20" x2="5" y2="-25"/>
      <line x1="0" y1="20" x2="-5" y2="25"/>
      <line x1="0" y1="20" x2="5" y2="25"/>
    </g>
    <circle cx="0" cy="0" r="3" fill="#FFFFFF"/>
  </g>
</svg>
