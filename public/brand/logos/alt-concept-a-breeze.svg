    <path d="M 64 90 Q 130 70 180 95 Q 150 105 130 96" stroke-width="14"/>
    <path d="M 58 134 Q 140 112 200 140 Q 160 152 132 140" stroke-width="14"/>
    <path d="M 64 176 Q 130 156 180 180 Q 150 190 130 182" stroke-width="14"/>
  </g>

  <!-- small accent dots implying motion -->
  <circle cx="50" cy="85" r="4" fill="#67E8F9"/>
  <circle cx="48" cy="130" r="4" fill="#67E8F9"/>
  <circle cx="50" cy="172" r="4" fill="#67E8F9"/>
</svg>
