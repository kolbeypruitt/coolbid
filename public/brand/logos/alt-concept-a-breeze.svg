<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1629"/>
      <stop offset="100%" stop-color="#1A2236"/>
    </linearGradient>
    <linearGradient id="breezeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="56" ry="56" fill="url(#bgGradA)" stroke="rgba(6,182,212,0.3)" stroke-width="2"/>

  <!-- Three parallel breeze/airflow curves forming an implied 'C' -->
